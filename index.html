        /* =========================
           Web Mercator + CartoDB Positron no labels
           Нужен для обычных XYZ-подложек. Если GeoJSON был выгружен в EPSG:32637,
           координаты автоматически переводятся в WGS84 перед созданием слоев.
           ========================= */

        function getFirstCoordinateFromGeometry(geometry) {
            if (!geometry || !geometry.coordinates) return null;
            var coords = geometry.coordinates;
            while (Array.isArray(coords) && Array.isArray(coords[0])) {
                coords = coords[0];
            }
            if (Array.isArray(coords) && typeof coords[0] === 'number' && typeof coords[1] === 'number') {
                return coords;
            }
            return null;
        }

        function coordinatesLookProjected(firstCoordinate) {
            if (!firstCoordinate) return false;
            return Math.abs(firstCoordinate[0]) > 180 || Math.abs(firstCoordinate[1]) > 90;
        }

        function transformCoordinatesFrom32637To4326(coords) {
            if (!Array.isArray(coords)) return coords;

            if (typeof coords[0] === 'number' && typeof coords[1] === 'number') {
                var transformed = proj4(
                    '+proj=utm +zone=37 +datum=WGS84 +units=m +no_defs',
                    'EPSG:4326',
                    [coords[0], coords[1]]
                );
                return [transformed[0], transformed[1]].concat(coords.slice(2));
            }

            return coords.map(transformCoordinatesFrom32637To4326);
        }

        function reprojectGeoJsonIfNeeded(geojson) {
            if (!geojson || !geojson.features || !geojson.features.length) return;
            var firstCoordinate = getFirstCoordinateFromGeometry(geojson.features[0].geometry);
            if (!coordinatesLookProjected(firstCoordinate)) return;

            geojson.features.forEach(function (feature) {
                if (feature.geometry && feature.geometry.coordinates) {
                    feature.geometry.coordinates = transformCoordinatesFrom32637To4326(feature.geometry.coordinates);
                }
            });
        }

        Object.keys(window).forEach(function (key) {
            if (key.indexOf('json_') === 0) {
                reprojectGeoJsonIfNeeded(window[key]);
            }
        });

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);

                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {

        function populateInfoPanelStats() {
            if (typeof json_countproblemsper20000_1 === 'undefined' || !json_countproblemsper20000_1.features) return;

            function getProperties(feature) {
                return feature && feature.properties ? feature.properties : {};
            }

            function toNumber(value) {
                var numberValue = Number(value);
                return Number.isNaN(numberValue) ? null : numberValue;
            }

            function districtName(props) {
                return props['NAME'] || props['name'] || 'Без названия';
            }

            function fillTopList(elementId, rows, valueGetter, suffix) {
                var list = document.getElementById(elementId);
                if (!list) return;

                var html = rows.slice(0, 10).map(function (props) {
                    var value = valueGetter(props);
                    return '<li><strong>' + escapeHtml(districtName(props)) + '</strong> — ' + formatNumberWithSpaces(value) + suffix + '</li>';
                }).join('');

                list.innerHTML = html || '<li>Нет данных</li>';
            }

            var properties = json_countproblemsper20000_1.features.map(getProperties);

            var byRate = properties
                .filter(function (props) { return toNumber(props['count']) !== null; })
                .sort(function (a, b) { return Number(b['count']) - Number(a['count']); });

            var byTotal = properties
                .filter(function (props) { return toNumber(props['Категория_count']) !== null; })
                .sort(function (a, b) { return Number(b['Категория_count']) - Number(a['Категория_count']); });

            fillTopList('top-rate-districts', byRate, function (props) {
                return Math.round(Number(props['count']));
            }, ' жалоб на 20 000 человек');

            fillTopList('top-total-districts', byTotal, function (props) {
                return Math.round(Number(props['Категория_count']));
            }, ' жалоб');
        }

        function setRussianAddressPlaceholder() {
            var inputs = document.querySelectorAll('.leaflet-photon input, input[type="search"], input[placeholder*="Search"], input[placeholder*="address"], input[placeholder*="Address"]');
            inputs.forEach(function (input) {
                input.placeholder = 'Введите адрес';
                input.setAttribute('aria-label', 'Введите адрес');
                input.style.paddingLeft = '18px';
                input.style.boxSizing = 'border-box';
            });
        }

        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatNumberWithSpaces(value) {
            if (value === null || value === undefined || value === '') return '';
            var numberValue = Number(value);
            if (Number.isNaN(numberValue)) return escapeHtml(value);
            return String(Math.round(numberValue)).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        function formatRate(value) {
            if (value === null || value === undefined || value === '') return '';
            var numberValue = Number(value);
            if (Number.isNaN(numberValue)) return escapeHtml(value);
            return String(Math.round(numberValue)).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        function popupTable(rows) {
            var html = '<table>';
            rows.forEach(function (row) {
                var label = row[0];
                var value = row[1];
                var isMain = row[2] === true;
                if (value === null || value === undefined || value === '') return;
                if (isMain) {
                    html += '<tr><td colspan="2"><strong>' + escapeHtml(label) + '</strong><br />' + escapeHtml(value) + '</td></tr>';
                } else {
                    html += '<tr><th scope="row">' + escapeHtml(label) + '</th><td>' + escapeHtml(value) + '</td></tr>';
                }
            });
            html += '</table>';
            return html;
        }

        function rebindPopup(layer, htmlBuilder) {
            if (!layer || typeof layer.eachLayer !== 'function') return;
            layer.eachLayer(function (featureLayer) {
                if (!featureLayer.feature || !featureLayer.feature.properties) return;
                var html = htmlBuilder(featureLayer.feature.properties);
                if (typeof featureLayer.unbindPopup === 'function') featureLayer.unbindPopup();
                if (html && typeof featureLayer.bindPopup === 'function') featureLayer.bindPopup(html, { maxHeight: 400 });
            });
        }

        function transparentNoDataStyle(layer, paneName) {
            if (!layer || typeof layer.eachLayer !== 'function') return;
            layer.eachLayer(function (cellLayer) {
                if (!cellLayer.feature || !cellLayer.feature.properties) return;
                var value = Number(cellLayer.feature.properties['Категория_count']);
                if (Number.isNaN(value) || value <= 0) {
                    if (typeof cellLayer.setStyle === 'function') {
                        cellLayer.setStyle({pane: paneName, stroke: false, fill: true, fillOpacity: 0, opacity: 0, color: 'transparent', fillColor: 'transparent', interactive: false});
                    }
                    cellLayer.options.interactive = false;
                    if (typeof cellLayer.unbindPopup === 'function') cellLayer.unbindPopup();
                } else if (typeof cellLayer.setStyle === 'function') {
                    cellLayer.setStyle({fillOpacity: GRID_VISIBLE_OPACITY});
                }
            });
        }

        function cleanCategoryGrids() {
            categoryGridLayers.forEach(function (gridLayer) {
                var paneName = gridLayer && gridLayer.options ? gridLayer.options.pane : null;
                transparentNoDataStyle(gridLayer, paneName);
                rebindPopup(gridLayer, function (props) {
                    return popupTable([['Количество жалоб', formatNumberWithSpaces(props['Категория_count'])]]);
                });
            });

        window.style_countproblemsper20000_1_0 = function (feature) {
            var value = Number(feature.properties['count']);
            var baseStyle = {
                pane: 'pane_countproblemsper20000_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 0.6,
                interactive: true
            };
            if (Number.isNaN(value)) {
                return Object.assign({}, baseStyle, {opacity: 0, fillOpacity: 0, color: 'transparent', fillColor: 'transparent', interactive: false});
            }
            if (value < 4) return Object.assign({}, baseStyle, {fillColor: 'rgba(213,193,255,1.0)'});
            if (value >= 4 && value <= 5) return Object.assign({}, baseStyle, {fillColor: 'rgba(173,147,223,1.0)'});
            if (value >= 6 && value <= 7) return Object.assign({}, baseStyle, {fillColor: 'rgba(133,101,191,1.0)'});
            if (value >= 8 && value <= 9) return Object.assign({}, baseStyle, {fillColor: 'rgba(92,55,159,1.0)'});
            return Object.assign({}, baseStyle, {fillColor: 'rgba(52,9,127,1.0)'});
        };

        function getCurrentScaleDenominator() {
            var center = map.getCenter();
            var metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, map.getZoom());
            return metersPerPixel * 96 / 0.0254;
        }

        function shouldHideGridByScale() {
            return getCurrentScaleDenominator() < GRID_HIDE_SCALE_DENOMINATOR;
        }

        function updateCategoryGridsByZoom() {
            var hideGrid = shouldHideGridByScale();
            complaintLayersByCategory.forEach(function (item) {
                if (!map.hasLayer(item.group)) return;
                if (hideGrid && item.group.hasLayer(item.grid)) {
                    item.group.removeLayer(item.grid);
                }
                if (!hideGrid && !item.group.hasLayer(item.grid)) {
                    item.group.addLayer(item.grid);
                    cleanCategoryGrids();
                }
            });
        }

                if (typeof featureLayer.setStyle !== 'function') return;
                if (hideLayer) {
                    featureLayer.setStyle({
                        opacity: 0,
                        fillOpacity: 0,
                        color: 'transparent',
                        fillColor: 'transparent'
                    });
                    featureLayer.options.interactive = false;
                } else {
                    featureLayer.setStyle(style_disprobwithoutzkh_2_0(featureLayer.feature));
                    featureLayer.options.interactive = true;
                }
            });
        }

                    featureLayer.options.interactive = true;
                }
            });
        }

        function removeOtherCategoryFeatures() {

            layer_pointsformap_4.eachLayer(function (featureLayer) {

        var fullscreenControl = L.control({ position: 'bottomleft' });
        fullscreenControl.onAdd = function () {
            var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-fullscreen');
            var button = L.DomUtil.create('a', 'leaflet-control-fullscreen-custom', container);
            button.href = '#';
            button.title = 'Открыть карту на весь экран';
            button.setAttribute('aria-label', 'Открыть карту на весь экран');
            button.innerHTML = '⛶';

            function isFullscreen() {
                return document.fullscreenElement || document.webkitFullscreenElement;
            }

            function openFullscreen(element) {
                if (element.requestFullscreen) {
                    return element.requestFullscreen();
                }
                if (element.webkitRequestFullscreen) {
                    return element.webkitRequestFullscreen();
                }
            }

            function closeFullscreen() {
                if (document.exitFullscreen) {
                    return document.exitFullscreen();
                }
                if (document.webkitExitFullscreen) {
                    return document.webkitExitFullscreen();
                }
            }

            function updateButtonState() {
                var active = isFullscreen();
                button.innerHTML = active ? '×' : '⛶';
                button.title = active ? 'Выйти из полноэкранного режима' : 'Открыть карту на весь экран';
                button.setAttribute('aria-label', button.title);
                setTimeout(function () {
                    map.invalidateSize();
                }, 150);
            }

            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);

            L.DomEvent.on(button, 'click', function (event) {
                L.DomEvent.preventDefault(event);
                var mapElement = document.getElementById('map');

                if (isFullscreen()) {
                    closeFullscreen();
                } else {
                    openFullscreen(mapElement);
                }

                setTimeout(updateButtonState, 250);
            });

            document.addEventListener('fullscreenchange', updateButtonState);
            document.addEventListener('webkitfullscreenchange', updateButtonState);

            return container;
        };
